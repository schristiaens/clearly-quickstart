name: Publish AGENTS.md from Clearly AI Review

# Triggered in two ways:
#   1. Manually via workflow_dispatch (paste content from a completed Clearly AI review)
#   2. Via repository_dispatch from a Clearly AI webhook when a review completes

on:
  workflow_dispatch:
    inputs:
      agents_md_content:
        description: "Paste the AGENTS.md content from your Clearly AI review"
        required: true
        type: string
      project_name:
        description: "Name of the Clearly AI project (used in PR title)"
        required: false
        default: "Security Review"
        type: string
      target_repo:
        description: "Target repo to publish AGENTS.md to (owner/repo). Defaults to this repo."
        required: false
        default: ""
        type: string

  # Webhook trigger: POST to /repos/schristiaens/clearly-quickstart/dispatches
  # with { "event_type": "clearly-review-complete", "client_payload": { ... } }
  repository_dispatch:
    types: [clearly-review-complete]

jobs:
  publish-agents-md:
    name: Publish AGENTS.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "content<<AGENTS_MD_EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.client_payload.agents_md_content }}" >> $GITHUB_OUTPUT
            echo "AGENTS_MD_EOF" >> $GITHUB_OUTPUT
            echo "project=${{ github.event.client_payload.project_name || 'Security Review' }}" >> $GITHUB_OUTPUT
            echo "target_repo=${{ github.event.client_payload.target_repo || github.repository }}" >> $GITHUB_OUTPUT
          else
            echo "content<<AGENTS_MD_EOF" >> $GITHUB_OUTPUT
            echo "${{ inputs.agents_md_content }}" >> $GITHUB_OUTPUT
            echo "AGENTS_MD_EOF" >> $GITHUB_OUTPUT
            echo "project=${{ inputs.project_name }}" >> $GITHUB_OUTPUT
            echo "target_repo=${{ inputs.target_repo || github.repository }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.inputs.outputs.target_repo }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write AGENTS.md
        run: |
          cat > AGENTS.md << 'AGENTS_MD_DELIMITER'
          ${{ steps.inputs.outputs.content }}
          AGENTS_MD_DELIMITER

      - name: Validate AGENTS.md has required sections
        run: |
          required_sections=(
            "Absolute Rules"
            "Required Patterns"
            "Secrets"
            "Authentication"
          )
          missing=()
          for section in "${required_sections[@]}"; do
            if ! grep -qi "$section" AGENTS.md; then
              missing+=("$section")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "WARNING: AGENTS.md may be incomplete. Missing sections: ${missing[*]}"
            echo "Review the content and regenerate if needed."
          else
            echo "AGENTS.md structure looks good."
          fi
          wc -l AGENTS.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            security: update AGENTS.md from Clearly AI review

            Auto-generated by Clearly AI "AGENTS.md Generator for Secure Vibe Coding"
            questionnaire. Review project: ${{ steps.inputs.outputs.project }}
          branch: "clearly-ai/agents-md-${{ github.run_number }}"
          delete-branch: true
          title: "security: update AGENTS.md — ${{ steps.inputs.outputs.project }}"
          body: |
            ## AGENTS.md Update

            This PR was auto-generated by the [Clearly AI AGENTS.md Generator](https://nebfog.clearly-app.com/)
            questionnaire running against the **${{ steps.inputs.outputs.project }}** project.

            ### What is AGENTS.md?
            `AGENTS.md` provides security guardrails for AI coding agents (Claude Code, Cursor, Copilot).
            It contains project-specific rules derived from a security assessment of this codebase.

            ### Review before merging
            - [ ] Verify the absolute rules match your codebase's actual patterns
            - [ ] Check that referenced libraries/tools are correct
            - [ ] Confirm forbidden patterns list is accurate
            - [ ] Ensure secrets handling rules match your secrets manager setup

            ---
            *Generated by [Clearly AI](https://nebfog.clearly-app.com/) · [Questionnaire source](questionnaires/agents-md-generator.yaml)*
          labels: "security,automated"
